<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NutriTrack AI</title>

  <!-- FIXED CDN (NO MORE ERROR) -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .card {
      background: white;
      color: black;
      padding: 30px;
      border-radius: 20px;
      width: 380px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 10px;
    }

    button {
      padding: 10px 20px;
      margin-top: 15px;
      background: #2a5298;
      border: none;
      color: white;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      background: #1e3c72;
    }

    #webcam-container {
      margin-top: 20px;
    }

    canvas {
      border-radius: 15px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    #label-container {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>🥗 NutriTrack AI</h1>
    <p>AI Food Detection</p>

    <button onclick="init()">Start Camera</button>

    <div id="webcam-container"></div>
    <div id="label-container"></div>
  </div>

<script>
  const URL = "https://teachablemachine.withgoogle.com/models/5ZJniRGuc/"; // PASTIKAN INI BENAR

  let model, webcam, labelContainer, maxPredictions;

  async function init() {
    try {
      const modelURL = URL + "model.json";
      const metadataURL = URL + "metadata.json";

      model = await tmImage.load(modelURL, metadataURL);
      maxPredictions = model.getTotalClasses();

      webcam = new tmImage.Webcam(300, 300, true);
      await webcam.setup();
      await webcam.play();
      window.requestAnimationFrame(loop);

      document.getElementById("webcam-container").innerHTML = "";
      document.getElementById("webcam-container").appendChild(webcam.canvas);

      labelContainer = document.getElementById("label-container");
      labelContainer.innerHTML = "";

    } catch (error) {
      alert("Camera error: " + error.message);
      console.error(error);
    }
  }

  async function loop() {
    webcam.update();
    await predict();
    window.requestAnimationFrame(loop);
  }

  async function predict() {
    const prediction = await model.predict(webcam.canvas);

    let highestProb = 0;
    let bestClass = "";

    for (let i = 0; i < prediction.length; i++) {
      if (prediction[i].probability > highestProb) {
        highestProb = prediction[i].probability;
        bestClass = prediction[i].className;
      }
    }

    labelContainer.innerHTML =
      "Detected: " + bestClass +
      " (" + (highestProb * 100).toFixed(2) + "%)";
  }
</script>

</body>
</html>
