<!DOCTYPE html>
<html>
<head>
    <title>NutriTrack AI</title>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest"></script>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            text-align: center;
            padding: 40px;
        }

        .card {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 20px;
            width: 420px;
            margin: auto;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        input {
            padding: 10px;
            width: 85%;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            margin-top: 10px;
            background: #2a5298;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        #webcam-container {
            margin-top: 15px;
        }

        #result {
            margin-top: 20px;
            text-align: left;
        }
    </style>
</head>

<body>

<h1>🥗 NutriTrack AI</h1>
<p>Camera + USDA Nutrition</p>

<div class="card">

    <input type="text" id="foodInput" placeholder="Masukkan makanan">
    <br>
    <button onclick="analyzeFood()">Analisis Nutrisi</button>
    <br><br>
    <button onclick="init()">Start Camera</button>

    <div id="webcam-container"></div>
    <div id="label-container"></div>

    <div id="result"></div>

</div>

<script>
const API_KEY = "du3c5wFmvCup7IbZj0vQiADFb0LzbEpi1goMRLeJ";
const URL = "https://teachablemachine.withgoogle.com/models/5ZJniRGuc/";

let model, webcam;

async function init() {
    const modelURL = URL + "model.json";
    const metadataURL = URL + "metadata.json";

    model = await tmImage.load(modelURL, metadataURL);

    webcam = new tmImage.Webcam(300, 300, true);
    await webcam.setup();
    await webcam.play();
    window.requestAnimationFrame(loop);

    document.getElementById("webcam-container").innerHTML = "";
    document.getElementById("webcam-container").appendChild(webcam.canvas);
}

async function loop() {
    webcam.update();
    await predict();
    window.requestAnimationFrame(loop);
}

async function predict() {
    const prediction = await model.predict(webcam.canvas);

    let highestProb = 0;
    let bestClass = "";

    for (let i = 0; i < prediction.length; i++) {
        if (prediction[i].probability > highestProb) {
            highestProb = prediction[i].probability;
            bestClass = prediction[i].className;
        }
    }

    document.getElementById("label-container").innerHTML =
        "Detected: " + bestClass + " (" + (highestProb*100).toFixed(2) + "%)";

    if (highestProb > 0.80) {
        document.getElementById("foodInput").value = bestClass;
    }
}

async function analyzeFood() {
    const food = document.getElementById("foodInput").value;

    const response = await fetch(
        `https://api.nal.usda.gov/fdc/v1/foods/search?query=${food}&pageSize=1&api_key=${API_KEY}`
    );

    const data = await response.json();

    if (!data.foods || data.foods.length === 0) {
        alert("Data tidak ditemukan");
        return;
    }

    const nutrients = data.foods[0].foodNutrients;

    let calories=0, protein=0, fat=0, carbs=0;

    nutrients.forEach(n => {
        if (n.nutrientName === "Energy") calories = n.value;
        if (n.nutrientName === "Protein") protein = n.value;
        if (n.nutrientName === "Total lipid (fat)") fat = n.value;
        if (n.nutrientName === "Carbohydrate, by difference") carbs = n.value;
    });

    document.getElementById("result").innerHTML = `
        <h3>Hasil Analisis</h3>
        <p><b>Makanan:</b> ${food}</p>
        <p><b>Kalori:</b> ${calories} kcal</p>
        <p><b>Protein:</b> ${protein} g</p>
        <p><b>Lemak:</b> ${fat} g</p>
        <p><b>Karbohidrat:</b> ${carbs} g</p>
    `;
}
</script>

</body>
</html>
