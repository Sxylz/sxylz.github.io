<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>NutriTrack AI</title>

  <!-- Teachable Machine Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4CAF50, #2E7D32);
      text-align: center;
      color: white;
      margin: 0;
      padding: 40px;
    }

    h1 {
      margin-bottom: 10px;
    }

    .card {
      background: white;
      color: black;
      padding: 20px;
      border-radius: 15px;
      width: 350px;
      margin: auto;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    button {
      background: #4CAF50;
      border: none;
      padding: 10px 20px;
      margin: 10px;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #388E3C;
    }

    #webcam-container {
      margin-top: 15px;
    }

    canvas {
      border-radius: 12px;
    }

    #label-container {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <h1>🍎 NutriTrack AI</h1>
  <p>Camera + USDA Nutrition</p>

  <div class="card">
    <button onclick="init()">Start Camera</button>

    <div id="webcam-container"></div>
    <div id="label-container"></div>
  </div>

<script>
  const URL = "https://teachablemachine.withgoogle.com/models/5ZJniRGuc/";

  let model, webcam, labelContainer, maxPredictions;

  async function init() {
    const modelURL = URL + "model.json";
    const metadataURL = URL + "metadata.json";

    model = await tmImage.load(modelURL, metadataURL);
    maxPredictions = model.getTotalClasses();

    webcam = new tmImage.Webcam(300, 300, true);
    await webcam.setup();
    await webcam.play();
    window.requestAnimationFrame(loop);

    document.getElementById("webcam-container").innerHTML = "";
    document.getElementById("webcam-container").appendChild(webcam.canvas);

    labelContainer = document.getElementById("label-container");
    labelContainer.innerHTML = "";
  }

  async function loop() {
    webcam.update();
    await predict();
    window.requestAnimationFrame(loop);
  }

  async function predict() {
    const prediction = await model.predict(webcam.canvas);

    let highestProb = 0;
    let bestClass = "";

    for (let i = 0; i < prediction.length; i++) {
      if (prediction[i].probability > highestProb) {
        highestProb = prediction[i].probability;
        bestClass = prediction[i].className;
      }
    }

    labelContainer.innerHTML =
      "Detected: " + bestClass +
      " (" + (highestProb * 100).toFixed(2) + "%)";
  }
</script>

</body>
</html>
